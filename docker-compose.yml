services:
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  flutter-web:
    build:
      context: flutter
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      mock-server:
        condition: service_healthy
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
