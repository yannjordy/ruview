name: aetheris
description: Aetheris — WiFi spatial intelligence platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  mqtt_client: ^10.0.0
  provider: ^6.1.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0
  web: ^0.5.0
  universal_io: ^2.2.2
  flutter_rust_bridge: ^2.0.0
  uuid: ^4.0.0
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_rust_bridge_codegen: ^2.0.0
  ffigen: ^9.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/config/
