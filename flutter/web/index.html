<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0F23">
  <meta name="description" content="Aetheris — WiFi spatial intelligence platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Aetheris</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; background: #0F0F23; overflow: hidden; }
    #aetheris-app { height: 100%; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
      color: #00BCD4; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(0,188,212,0.2);
      border-top-color: #00BCD4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="aetheris-app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Aetheris</span>
    </div>
  </div>
  <script src="flutter.js" defer></script>
</body>
</html>
