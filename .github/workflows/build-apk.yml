name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Generate platform directories
        run: |
          flutter create --platforms=android,web --project-name aetheris .
        working-directory: ./flutter

      - name: Restore pub dependencies from cache
        run: |
          flutter pub get
        working-directory: ./flutter

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi
        working-directory: ./flutter

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aetheris-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk

      - name: Build web
        run: |
          flutter build web --release
        working-directory: ./flutter

      - name: Upload web
        uses: actions/upload-artifact@v4
        with:
          name: aetheris-web
          path: flutter/build/web
